services:
  api:
    # 1. Diz ao Compose para usar a sua nova imagem otimizada de 2 estágios
    build:
      context: .
      dockerfile: Dockerfile.prod

    image: vango-api:${IMAGE_TAG:-latest}
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    restart: always
    volumes: []

    # Em produção o banco é o RDS (via DATABASE_URL), não o postgres local.
    # Remover a dependência do serviço `db` do compose base.
    depends_on: []

    # 2. Exponha a porta para o servidor EC2 poder receber tráfego de fora
    ports:
      - "8000:8000"

    # 3. Trava o crescimento infinito dos arquivos de texto (Máximo de 30MB guardados)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Não sobe o postgres local em produção
  db:
    scale: 0
