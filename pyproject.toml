[tool.ruff]
target-version = "py312"
line-length = 140
extend-exclude = ["migrations"]

[tool.ruff.lint]
# E: pycodestyle, F: Pyflakes, I: isort (organiza imports)
# ANN: flake8-annotations (Obrigada a ter tipagem em tudo)
# B: flake8-bugbear (pega bugs comuns)
select = ["E", "F", "I", "ANN", "B", "UP"]
ignore = [
    "ANN401", # Permite Any em casos muito específicos
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN", "I", "UP", "E402", "F401", "F841", "F811"]

[tool.ruff.lint.flake8-annotations]
allow-star-arg-any = true
suppress-none-returning = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.mypy]
python_version = "3.12"
plugins = ["pydantic.mypy", "sqlalchemy.ext.mypy.plugin"]
strict = false
ignore_missing_imports = true
explicit_package_bases = true
warn_unused_configs = true
show_error_codes = true
pretty = true

[tool.pydantic-mypy]
init_forbid_extra = false
init_typed = true
warn_required_dynamic_aliases = true

[tool.bandit]
exclude_dirs = ["tests", "migrations"]
skips = ["B101"]

[tool.coverage.run]
source = ["src"]
omit = [
    "tests/*",
    "migrations/*",
]

[[tool.mypy.overrides]]
module = [
    "src.domains.dependents.controller",
    "src.domains.dependents.service",
    "src.domains.route_passangers.service",
    "src.domains.routes.controller",
    "src.domains.routes.service",
    "src.domains.routing.route_totals",
    "src.domains.trips.service",
    "src.domains.users.controller",
    "src.domains.users.dtos",
    "src.domains.users.service",
    "src.domains.vehicles.controller",
    "src.domains.vehicles.service",
    "src.infrastructure.repositories.trip_passanger_repository",
    "src.infrastructure.routing.mapbox_routing_service",
    "src.infrastructure.socketio.server",
]
ignore_errors = true
