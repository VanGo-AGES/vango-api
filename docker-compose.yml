services:
  api:
    build: .
    container_name: vango_api
    command: sleep infinity
    volumes:
      - .:/code
      - pre-commit-cache:/root/.cache/pre-commit
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: vango_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT_EXTERNAL}:5432"
    volumes:
      - vango_postgres_data:/var/lib/postgresql/data

  lint:
    build: .
    container_name: vango_lint
    volumes:
      - .:/code
    command: ruff check . --watch

volumes:
  pre-commit-cache:
  vango_postgres_data:
